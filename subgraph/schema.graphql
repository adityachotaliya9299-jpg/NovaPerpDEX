"""
A limit order placed on OrderBook. Mirrors the on-chain Order struct plus
denormalized lifecycle status, so the frontend never needs to scan order IDs.
Mutable: the same Order row is updated as it moves through PLACED -> EXECUTED/CANCELLED.
"""
type Order @entity(immutable: false) {
  id: ID! # orderId as string
  account: Bytes!
  market: Bytes!
  status: String! # "PLACED" | "EXECUTED" | "CANCELLED"
  placedAt: BigInt!
  placedTxHash: Bytes!
  executedAt: BigInt
  executedPrice: BigInt
  executedTxHash: Bytes
  cancelledAt: BigInt
  cancelledTxHash: Bytes
}

"""
A single position-mutation event (open, increase, decrease, close). One row
per on-chain event — this is the append-only trade history feed. Never
updated after creation.
"""
type PositionEvent @entity(immutable: true) {
  id: ID! # txHash-logIndex
  key: Bytes!
  account: Bytes!
  market: Bytes!
  kind: String! # "INCREASE" | "DECREASE"
  side: Int
  sizeDelta: BigInt!
  collateralDelta: BigInt
  realizedPnl: BigInt
  price: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
Current state of a position, keyed by the same positionKey the contract
uses. Upserted on every increase/decrease/liquidation so a single query
gives the live position without re-deriving it from the full event log.
Mutable: the same Position row is updated in place as size/collateral change.
"""
type Position @entity(immutable: false) {
  id: ID! # positionKey (bytes32) as hex string
  account: Bytes!
  market: Bytes!
  side: Int!
  size: BigInt!
  collateral: BigInt!
  entryPrice: BigInt!
  status: String! # "OPEN" | "CLOSED" | "LIQUIDATED"
  openedAt: BigInt!
  lastUpdatedAt: BigInt!
  closedAt: BigInt
}

"""
A liquidation event, denormalized with the data needed for a liquidations
feed without joining back to Position. Never updated after creation.
"""
type LiquidationEvent @entity(immutable: true) {
  id: ID! # txHash-logIndex
  account: Bytes!
  market: Bytes!
  side: Int!
  keeper: Bytes!
  size: BigInt!
  pnl: BigInt!
  price: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
A persisted funding-rate update. Used to chart historical funding over time
per market. Never updated after creation.
"""
type FundingUpdate @entity(immutable: true) {
  id: ID! # txHash-logIndex
  market: Bytes!
  cumulativeIndex: BigInt!
  ratePerSecond: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
Phase 13.5 — running total trading volume per account, across all markets,
both sides, both increases and decreases (volume counts notional touched,
not net position change). Updated incrementally in the same handlers that
already write PositionEvent, so no separate data source is needed. Powers
the Rewards Hub leaderboard. Mutable: incremented on every trade.
"""
type TraderVolume @entity(immutable: false) {
  id: ID! # account address, lowercase hex
  account: Bytes!
  totalVolume: BigInt!
  tradeCount: Int!
  lastTradeAt: BigInt!
}

# ===================================================================== #
#                  Phase B — Agent / StrategyVault entities             #
# ===================================================================== #

"""
A registered strategy vault, created via StrategyFactory.createStrategy.
This is the canonical record the frontend's /strategies page queries —
denormalized with creator, thesis, and live aggregate stats so the
discovery page never needs N+1 queries per card.
Mutable: aggregate stats (nav, totalDeposited, tradeCount) update as the
strategy trades and accepts deposits.
"""
type Strategy @entity(immutable: false) {
  id: ID! # vault address, lowercase hex
  vault: Bytes!
  creator: Bytes!
  agentWallet: Bytes!
  name: String!
  thesis: String!
  maxDrawdownBps: BigInt!
  maxLeverageBps: BigInt!
  maxSinglePositionBps: BigInt!
  createdAt: BigInt!
  createdTxHash: Bytes!
  active: Boolean!
  tradingHalted: Boolean!

  # Live aggregates, updated incrementally by handlers — avoids the
  # frontend needing to sum PositionEvent/StrategyTrade rows on every load.
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  investorCount: Int!
  tradeCount: Int!
  lastTradeAt: BigInt
  peakNAV: BigInt!
  currentDrawdownBpsAtLastUpdate: BigInt!
}

"""
A single agent trading decision (AgentTraded event). Append-only — this IS
the transparency mechanic: every entry has the LLM's human-readable reason
string, permanently queryable. Powers the Agent Log tab (Phase F).
"""
type StrategyTrade @entity(immutable: true) {
  id: ID! # txHash-logIndex
  strategy: Bytes! # vault address — denormalized for direct filtering
  market: Bytes!
  side: Int!
  sizeDelta: BigInt!
  collateralDelta: BigInt!
  isIncrease: Boolean!
  reason: String!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
An investor deposit into a strategy. Append-only.
"""
type StrategyDeposit @entity(immutable: true) {
  id: ID! # txHash-logIndex
  strategy: Bytes!
  investor: Bytes!
  assets: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
An investor withdrawal from a strategy. Append-only.
"""
type StrategyWithdraw @entity(immutable: true) {
  id: ID! # txHash-logIndex
  strategy: Bytes!
  investor: Bytes!
  assets: BigInt!
  shares: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
A drawdown breach event — trading auto-halted. Append-only, and these
should be rare; surfaced prominently in the Risk Center / Agent Log.
"""
type DrawdownEvent @entity(immutable: true) {
  id: ID! # txHash-logIndex
  strategy: Bytes!
  currentDrawdownBps: BigInt!
  limitBps: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
Per-investor position within a specific strategy. Upserted on every
deposit/withdraw so "my strategies" pages can query directly instead of
re-deriving from the deposit/withdraw event log.
Mutable.
"""
type StrategyPosition @entity(immutable: false) {
  id: ID! # strategy-investor, both lowercase hex
  strategy: Bytes!
  investor: Bytes!
  sharesHeld: BigInt!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  firstDepositAt: BigInt!
  lastActivityAt: BigInt!
}