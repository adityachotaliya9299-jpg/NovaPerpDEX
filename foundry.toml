[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 50, fail_on_revert = false }

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 1000, depth = 100 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
